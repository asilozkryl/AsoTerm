appId: com.asilozkryl.asoterm
productName: AsoTerm
copyright: © 2026 asilozkryl

# Otomatik güncelleme sağlayıcısı: GitHub Releases.
# Bu yapılandırma sayesinde build, electron-updater'ın okuduğu güncelleme
# meta dosyalarını (latest.yml / latest-mac.yml + *.blockmap) üretir ve
# uygulamaya app-update.yml gömülür.
publish:
  provider: github
  owner: asilozkryl
  repo: AsoTerm

directories:
  output: dist-installer
  buildResources: build

# Yalın paket: renderer Vite ile, main/preload esbuild ile out/ içine bundle edilir;
# çalışma anında node_modules gerekmez (main yalnız electron + node builtin kullanır).
files:
  - out/**/*
  - package.json

npmRebuild: false

# --- Windows ---
win:
  target:
    - nsis
  executableName: AsoTerm
  artifactName: ${productName}-${version}-setup.${ext}
  # Go sidecar ikilisi app.asar dışına, resources köküne kopyalanır
  # (main: app.isPackaged ise process.resourcesPath/asoterm-server.exe).
  extraResources:
    - from: resources/asoterm-server.exe
      to: asoterm-server.exe

nsis:
  # Tek tık kurulum: ilk kurulum sihirbazsız, otomatik güncellemeler sessiz
  # (electron-updater quitAndInstall(true) → arka planda kur, yeniden başlat).
  oneClick: true
  perMachine: false
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: AsoTerm
  uninstallDisplayName: AsoTerm

# --- macOS ---
mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  artifactName: ${productName}-${version}-${arch}.${ext}
  identity: null # kod imzalama yok (imzasız/ad-hoc derleme)
  # macOS'ta sidecar AsoTerm.app/Contents/Resources/asoterm-server olur
  # (main: process.platform !== win32 -> 'asoterm-server', uzantısız).
  extraResources:
    - from: resources/asoterm-server
      to: asoterm-server

dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}

# --- Linux ---
linux:
  category: Utility
  target:
    - AppImage
    - deb
  executableName: AsoTerm
  artifactName: ${productName}-${version}-${arch}.${ext}
  extraResources:
    - from: resources/asoterm-server
      to: asoterm-server

